<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>Counsellor Login | MindGuard</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="auth-layout">
    <section class="card auth-card">
      <aside class="auth-feature">
        <div class="eyebrow">Counselor Console</div>
        <h1 class="page-title">Manage assigned students with AI context.</h1>
        <p class="lead">Review PFADS results, alerts, live messages, and workload-aware case assignments.</p>
      </aside>
      <div class="auth-form-wrap">
        <h2>Counselor Login</h2>
        <p class="small" data-error-box></p>
        <form class="stack" data-auth-form data-endpoint="/api/auth/counselors/login">
          <div class="field">
            <label>Email</label>
            <input type="email" name="email" required />
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" name="password" required />
          </div>
          <div class="button-row">
            <button class="btn" type="submit">Login</button>
            <a class="btn-ghost" href="/counselor-register.html">Register</a>
          </div>
        </form>
      </div>
    </section>
    <script type="module" src="/js/mobile-shell.js"></script>
    <script type="module" src="/js/auth-page.js"></script>
  </body>
</html>
