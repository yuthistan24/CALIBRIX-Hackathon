<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social & Peer Support | MindGuard</title>
<link rel="stylesheet" href="/css/styles.css">
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;padding:40px;}
h1{margin-bottom:40px;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:30px;max-width:1200px;margin:auto;}
.card{background:#1e293b;padding:20px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.4);transition:0.3s;}
.card:hover{transform:scale(1.04);}
iframe{width:100%;height:220px;border-radius:10px;border:none;}
.title{margin-top:10px;font-size:18px;font-weight:bold;}
.desc{font-size:14px;opacity:0.8;}
.back-btn{margin:20px auto;padding:10px 20px;background:#6b7280;color:white;border:none;border-radius:999px;cursor:pointer;}
.back-btn:hover{background:#4b5563;}
</style>
</head>
<body>
<h1>Recommended Videos for Social & Peer Support</h1>
<button class="back-btn" onclick="window.location.href='/dashboard.html'">Back to Dashboard</button>
<div class="container">
<div class="card">
<iframe src="https://www.youtube.com/embed/FetEULnMgIs" allowfullscreen></iframe>
<div class="title">Confidence Building</div>
<div class="desc">Learn techniques to build confidence and improve self-belief.</div>
</div>
<div class="card">
<iframe src="https://www.youtube.com/embed/ps8xepYEL0g" allowfullscreen></iframe>
<div class="title">Communication Skills</div>
<div class="desc">Improve how you speak, express ideas, and connect with others.</div>
</div>
<div class="card">
<iframe src="https://www.youtube.com/embed/3ftEe8_b25M" allowfullscreen></iframe>
<div class="title">Overcoming Loneliness</div>
<div class="desc">Helpful advice for building meaningful social connections.</div>
</div>
</div>
</body>
</html>
