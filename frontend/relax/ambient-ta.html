<!DOCTYPE html>
<html lang="ta">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>அமைதி ஒலி | MindGuard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
      body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;padding:40px;}
      h1{margin-bottom:18px;}
      .container{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:30px;max-width:1200px;margin:auto;}
      .card{background:#1e293b;padding:20px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.4);transition:0.3s;}
      .card:hover{transform:scale(1.03);}
      iframe{width:100%;height:220px;border-radius:10px;border:none;}
      .title{margin-top:10px;font-size:18px;font-weight:bold;}
      .desc{font-size:14px;opacity:0.8;}
      .back-btn{margin:20px auto;padding:10px 20px;background:#6b7280;color:white;border:none;border-radius:999px;cursor:pointer;}
      .back-btn:hover{background:#4b5563;}
    </style>
  </head>
  <body>
    <h1>கவனம் & அமைதி — ambient noise</h1>
    <p class="desc">படிப்பு / ஓய்வு நேரத்தில் 10–20 நிமிடங்கள் முயற்சி செய்யுங்கள்.</p>
    <button class="back-btn" onclick="window.location.href='/dashboard.html'">Dashboard</button>
    <div class="container">
      <div class="card">
        <iframe src="https://www.youtube.com/embed/mPZkdNFkNps" allowfullscreen></iframe>
        <div class="title">மழை ஒலி</div>
        <div class="desc">கவனச் சிதறலை குறைக்க உதவும்.</div>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/nMfPqeZjc2c" allowfullscreen></iframe>
        <div class="title">White noise</div>
        <div class="desc">நிதானமான பின்னணி ஒலி.</div>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/1ZYbU82GVz4" allowfullscreen></iframe>
        <div class="title">கடல் அலைகள்</div>
        <div class="desc">மென்மையான அலை ஒலி.</div>
      </div>
    </div>
  </body>
</html>
