<!DOCTYPE html>
<html lang="ta">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>இசை | MindGuard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
      body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;padding:40px;}
      h1{margin-bottom:18px;}
      .container{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:30px;max-width:1200px;margin:auto;}
      .card{background:#1e293b;padding:20px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.4);transition:0.3s;}
      .card:hover{transform:scale(1.03);}
      iframe{width:100%;height:220px;border-radius:10px;border:none;}
      .title{margin-top:10px;font-size:18px;font-weight:bold;}
      .desc{font-size:14px;opacity:0.8;}
      .back-btn{margin:20px auto;padding:10px 20px;background:#6b7280;color:white;border:none;border-radius:999px;cursor:pointer;}
      .back-btn:hover{background:#4b5563;}
    </style>
  </head>
  <body>
    <h1>படிப்புக்கு இசை</h1>
    <p class="desc">Instrumental / மென்மையான பின்னணி இசை.</p>
    <button class="back-btn" onclick="window.location.href='/dashboard.html'">Dashboard</button>
    <div class="container">
      <div class="card">
        <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" allowfullscreen></iframe>
        <div class="title">Lo‑fi beats</div>
        <div class="desc">கவனம் நிலைக்க உதவும்.</div>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/GRxofEmo3HA" allowfullscreen></iframe>
        <div class="title">Piano instrumental</div>
        <div class="desc">மென்மையான instrumental set.</div>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/5qap5aO4i9A" allowfullscreen></iframe>
        <div class="title">Chill stream</div>
        <div class="desc">மாறுபட்ட stream link.</div>
      </div>
    </div>
  </body>
</html>
