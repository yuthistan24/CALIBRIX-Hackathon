<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comedy Break | MindGuard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
      body{font-family:Arial;background:#0f172a;color:white;text-align:center;margin:0;padding:40px;}
      h1{margin-bottom:18px;}
      .container{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:30px;max-width:1200px;margin:auto;}
      .card{background:#1e293b;padding:20px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.4);transition:0.3s;}
      .card:hover{transform:scale(1.03);}
      iframe{width:100%;height:220px;border-radius:10px;border:none;}
      .title{margin-top:10px;font-size:18px;font-weight:bold;}
      .desc{font-size:14px;opacity:0.8;}
      .back-btn{margin:20px auto;padding:10px 20px;background:#6b7280;color:white;border:none;border-radius:999px;cursor:pointer;}
      .back-btn:hover{background:#4b5563;}
    </style>
  </head>
  <body>
    <h1>Comedy break</h1>
    <p class="desc">A short laugh can help reset the brain. Keep it small: 5–10 minutes.</p>
    <button class="back-btn" onclick="window.location.href='/dashboard.html'">Back to Dashboard</button>
    <div class="container">
      <div class="card">
        <iframe src="https://www.youtube.com/embed/9OZyJ4wYxIQ" allowfullscreen></iframe>
        <div class="title">Stand‑up (short)</div>
        <div class="desc">Light, low-stakes humor.</div>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/0bR3xD9zH7w" allowfullscreen></iframe>
        <div class="title">Clean comedy clip</div>
        <div class="desc">Quick reset and back to tasks.</div>
      </div>
      <div class="card">
        <iframe src="https://www.youtube.com/embed/2Z4m4lnjxkY" allowfullscreen></iframe>
        <div class="title">Funny talk (short)</div>
        <div class="desc">Short and easy watch.</div>
      </div>
    </div>
  </body>
</html>
